# Gitleaks configuration for shipwright-webui.
#
# Extends gitleaks' full built-in ruleset (useDefault = true) and adds a
# narrowly-scoped allowlist for ONE confirmed false positive.
#
# False positive: the built-in `sidekiq-secret` rule matches the shape
# `[a-f0-9]{8}:[a-f0-9]{8}`. A documentation placeholder using the famous
# magic-hex constants `cafebabe` / `deadbeef` (i.e. `cafebabe:deadbeef`)
# matches that shape but is obviously NOT a real credential — it is an
# example token, never a live secret. It surfaced from a transient GitHub
# pull-request merge-ref during CI (the string is present in no tracked
# file on any branch — verified via `git grep` across all refs and a clean
# `git archive` scan). This allowlist keeps the secret gate meaningful for
# every real rule while suppressing this single, self-evident placeholder.
title = "shipwright-webui gitleaks config"

[extend]
useDefault = true

[allowlist]
description = "Placeholder magic-hex (cafebabe:deadbeef) false-matched by the sidekiq-secret rule; not a real secret."
regexTarget = "match"
regexes = [
  '''cafebabe:deadbeef''',
]
# Belt-and-suspenders: any finding whose secret contains these famous
# magic-hex placeholders is treated as a non-secret regardless of rule.
stopwords = [
  "cafebabe",
  "deadbeef",
]
