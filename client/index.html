<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <!-- viewport-fit=cover: draw under the iOS notch/home-indicator so
         env(safe-area-inset-*) padding can reclaim it.
         interactive-widget=resizes-content: the soft keyboard RESIZES the
         layout (terminal key bar + input line stay above it) instead of
         overlaying (iterate-2026-06-14-phone-responsive-view AC-6). -->
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover, interactive-widget=resizes-content"
    />
    <!-- Fonts are self-hosted (A05): @fontsource-variable/inter +
         @fontsource-variable/geist-mono, imported in src/main.tsx. The former
         Google-Fonts preconnect + stylesheet link was removed — a CDN font
         breaks this local-first tool offline and makes A00's container-generated
         visual baselines permanently unstable (fallback in the container, real
         face on the dev box). AC4 asserts ZERO CDN font requests on load. -->
    <title>Shipwright Command Center</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
