name: CodeQL

# GitHub's own deep-dataflow SAST, mirroring the monorepo's codeql.yml for
# CI parity. This repo is pure JS/TS (client + server), so the matrix carries
# only `javascript-typescript` (the monorepo also analyzes Python).
on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  schedule:
    - cron: '0 6 * * 1'  # Monday 06:00 UTC — weekly full scan
  workflow_dispatch:

# Least-privilege GITHUB_TOKEN (OpenSSF Scorecard Token-Permissions): read-only
# default for any future job; the analyze job below widens itself to the exact
# scopes codeql-action needs (security-events: write for the SARIF upload).
permissions:
  contents: read

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write

    strategy:
      fail-fast: false
      matrix:
        language: [javascript-typescript]

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Initialize CodeQL
        # build-mode: none — a pure JS/TS repo needs no compilation for
        # extraction, so CodeQL reads source directly (no autobuild step).
        # The monorepo's codeql.yml uses autobuild because it also analyzes
        # Python.
        uses: github/codeql-action/init@7188fc363630916deb702c7fdcf4e481b751f97a # v4.37.1
        with:
          languages: ${{ matrix.language }}
          build-mode: none
          # security-extended (not security-and-quality): keep every CWE-tagged
          # security query, drop the maintainability-only ones (unused-local,
          # trivial-conditional, useless-assignment) that were note/warning
          # noise rather than vulnerabilities.
          queries: security-extended
          # paths-ignore for tests / e2e / dev-scripts — non-production code.
          config-file: ./.github/codeql/codeql-config.yml

      - name: Perform analysis
        # continue-on-error: a private repo without GitHub code scanning
        # (Advanced Security) fails the SARIF upload with "Advanced Security
        # must be enabled for this repository". The QL analysis still runs;
        # once Code Scanning is enabled (public repos: free) this succeeds
        # normally. Mirrors the guard on security.yml's upload-sarif step.
        uses: github/codeql-action/analyze@7188fc363630916deb702c7fdcf4e481b751f97a # v4.37.1
        continue-on-error: true
        with:
          category: "/language:${{ matrix.language }}"
