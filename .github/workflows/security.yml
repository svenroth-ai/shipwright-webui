name: Security Scan

# ACTIVE: runs on every PR to main + a weekly full scan (Mon 06:00 UTC) +
# manual workflow_dispatch. Mirrors the monorepo security.yml.
#
# SARIF upload to the Security tab is best-effort (`continue-on-error` on the
# upload step): while this repo is private without GitHub Advanced Security
# the upload is rejected, but the scanners + the critical-findings gate run
# regardless, so PRs are still gated on critical findings. To surface SARIF in
# the Security tab, enable Code Scanning (repo Settings → Code security).
on:
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 6 * * 1'  # Monday 06:00 UTC — weekly full scan
  workflow_dispatch:

# IMPORTANT: explicit permissions block — once any key is set, GitHub
# silently flips every UNLISTED permission to `none` for the run. The
# four below are the floor; do not delete any without re-checking the
# downstream actions that depend on them. See
# shared/scripts/lib/security_workflow.py for the convention lock.
#
# Intentionally TOP-LEVEL — unlike the sibling workflows (ci/codeql/bloat-check/
# pr-review), which keep a read-only top-level and widen per-job. This single-job
# SARIF workflow is convention-locked by the compliance A5.3 audit, which reads
# the *top-level* `permissions:`. With one job, top-level == job-level effective
# scope, so there is no least-privilege loss; do NOT move these to the `scan` job
# without first teaching A5.3 to read the job's effective permissions.
permissions:
  contents: read           # actions/checkout@v4
  actions: read            # github/codeql-action/upload-sarif@v4 (SARIF attach)
  security-events: write   # SARIF upload to Code Scanning
  pull-requests: write     # Post PR comment summary

concurrency:
  group: security-${{ github.ref }}
  cancel-in-progress: true

jobs:
  scan:
    name: Shipwright Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          # Working-tree checkout only. No scanner in this workflow reads git
          # history: Gitleaks runs `--no-git` (filesystem), Semgrep scans `.`
          # and Trivy scans `fs .` — all operate on the checked-out tree. A
          # full-history fetch (fetch-depth: 0) is unnecessary here and has
          # correlated with a stale-merge-ref Gitleaks false positive.
          fetch-depth: 1

      # --- OSS scanner installation (pinned per-tool versions) ---

      - name: Install Semgrep
        run: pip install semgrep

      - name: Install Trivy
        run: |
          wget -qO - https://aquasecurity.github.io/trivy-repo/deb/public.key | sudo gpg --dearmor -o /usr/share/keyrings/trivy.gpg
          echo "deb [signed-by=/usr/share/keyrings/trivy.gpg] https://aquasecurity.github.io/trivy-repo/deb generic main" | sudo tee -a /etc/apt/sources.list.d/trivy.list
          sudo apt-get update
          sudo apt-get install -y trivy

      - name: Install Gitleaks
        run: |
          # Download to disk + verify SHA256 before extracting (supply-chain
          # integrity): the old `wget | tar` piped an unverified tarball
          # straight into extraction. The default GitHub-Actions bash shell
          # runs with `-eo pipefail`, so a checksum mismatch aborts the step.
          GITLEAKS_VERSION="8.21.2"
          GITLEAKS_SHA256="5bc41815076e6ed6ef8fbecc9d9b75bcae31f39029ceb55da08086315316e3ba"
          TARBALL="gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz"
          wget -qO "$TARBALL" "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/${TARBALL}"
          echo "${GITLEAKS_SHA256}  ${TARBALL}" | sha256sum -c -
          tar xzf "$TARBALL"
          sudo mv gitleaks /usr/local/bin/
          rm -f "$TARBALL"
          gitleaks version

      - name: Prepare SARIF output directory
        run: mkdir -p sarif

      # --- Run scans (each emits native SARIF; failures are tolerated so
      #     the critical-gate step decides whether the workflow blocks merge) ---

      - name: Run Semgrep (SAST)
        run: semgrep scan --config auto --sarif --output sarif/semgrep.sarif .
        continue-on-error: true

      - name: Run Trivy (SCA + IaC)
        run: trivy fs --format sarif --output sarif/trivy.sarif --scanners vuln,misconfig .
        continue-on-error: true

      - name: Run Gitleaks (Secrets)
        run: gitleaks detect --report-format sarif --report-path sarif/gitleaks.sarif --no-git || true

      # --- Upload SARIF and post PR comment (with fork-PR guards) ---
      #
      # Fork-PR guard: PRs from forks run with a read-only GITHUB_TOKEN, so
      # security-events:write and pull-requests:write are not granted. Both
      # steps below are skipped on fork PRs (`head.repo.full_name` differs
      # from the workflow's repository). Same-repo PRs, workflow_dispatch,
      # and schedule events still upload SARIF and (for PR events) post
      # comments.

      - name: Upload SARIF to GitHub Security
        if: always() && (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository)
        # `continue-on-error: true` so this step never gates the workflow:
        # - Public repos: Code Scanning is free and on by default → uploads
        #   land in the Security tab as expected.
        # - Private repos without GitHub Advanced Security: the API returns
        #   "Advanced Security must be enabled for this repository to use
        #   code scanning" and the step fails. The findings still live in
        #   `findings.json` + `prompt_risks.json` + the SARIF artifact
        #   (uploaded below via actions/upload-artifact) + the critical-
        #   gate downstream — none of which require GHAS. So a Private-
        #   no-GHAS repo still gets the value of the scan; only the
        #   Security-tab integration is missing.
        # - v4 of the action (v3 deprecation lands 2026-12).
        uses: github/codeql-action/upload-sarif@7188fc363630916deb702c7fdcf4e481b751f97a # v4.37.1
        continue-on-error: true
        with:
          sarif_file: sarif
          category: shipwright-security

      - name: Build PR comment summary
        if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository
        shell: bash
        run: |
          set -e
          {
            echo "## Shipwright Security Scan"
            echo ""
            echo "| Scanner | SARIF emitted |"
            echo "|---|---|"
            for tool in semgrep trivy gitleaks; do
              if [ -f "sarif/${tool}.sarif" ]; then
                echo "| ${tool} | ✓ |"
              else
                echo "| ${tool} | — |"
              fi
            done
            echo ""
            echo "Findings (if any) appear under the **Security** tab → "
            echo "_Code scanning_ → category **shipwright-security**."
          } > pr-comment.md

      - name: Post PR comment
        if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository
        # Third-party action pinned to a full commit SHA (supply-chain
        # hardening); trailing comment records the human-readable tag.
        uses: peter-evans/create-or-update-comment@71345be0265236311c031f5c7866368bd1eff043  # v4
        with:
          issue-number: ${{ github.event.pull_request.number }}
          body-path: pr-comment.md
          edit-mode: replace

      - name: Check for critical findings
        id: shipwright-critical-gate
        shell: bash
        run: |
          set -e
          # The merge gate. Two independent blocking conditions:
          #   1. A CVSS-critical finding — security-severity >= 9.0 (GitHub's
          #      0.0–10.0 mapping). SARIF carries security-severity on the
          #      RULE (tool.driver.rules[].properties), NOT on the result, so
          #      each result is resolved to its rule by ruleId (ruleIndex as
          #      a fallback). Reading it off the result directly — the prior
          #      bug — made the gate structurally unable to ever fire:
          #      Semgrep/Gitleaks emit it nowhere and Trivy only on the rule,
          #      so every finding read as "0" and a real critical passed green.
          #   2. A leaked secret — ANY result emitted by the Gitleaks run. A
          #      committed secret is always merge-blocking regardless of score.
          # Fail CLOSED if sarif/ is empty or a file is not valid JSON: that
          # means a scanner crashed, and counting it as "0 findings" would let
          # a broken scan pass green (the old `2>/dev/null || echo 0` did).
          # Scanners that emit no security-severity (e.g. Semgrep --config
          # auto) do not block on their own — a critical gate firing on every
          # auto-finding would be unusable.
          # Mirrors the canonical, regression-tested gate in the shipwright
          # monorepo (shared/templates/github-actions/security.yml.template).
          shopt -s nullglob
          files=(sarif/*.sarif)
          if [ ${#files[@]} -eq 0 ]; then
            echo "::error::No SARIF files in sarif/ — every scanner crashed or produced no output. Failing closed."
            exit 1
          fi
          critical=0
          secrets=0
          for f in "${files[@]}"; do
            if ! jq empty "$f" 2>/dev/null; then
              echo "::error::$f is not valid JSON — a scanner emitted a broken report. Failing closed."
              exit 1
            fi
            # CVSS-critical: resolve each result -> its rule's security-severity.
            c=$(jq '
              [ .runs[]?
                | (.tool.driver.rules // []) as $rules
                | ( reduce ($rules[]? | select(.id != null)) as $r
                      ({}; .[$r.id] = ($r.properties["security-severity"] // null)) ) as $by_id
                | .results[]?
                | . as $res
                | ( $res.properties["security-severity"]
                    // (if $res.ruleId != null then $by_id[$res.ruleId] else null end)
                    // (if $res.ruleIndex != null then ($rules[$res.ruleIndex].properties["security-severity"] // null) else null end)
                    // "0" )
                | (try tonumber catch 0)
                | select(. >= 9.0)
              ] | length
            ' "$f")
            critical=$((critical + c))
            # Secret leaks: any result from the Gitleaks driver blocks.
            s=$(jq '[ .runs[]? | select((.tool.driver.name // "") | ascii_downcase | test("gitleaks")) | .results[]? ] | length' "$f")
            secrets=$((secrets + s))
          done
          total=$((critical + secrets))
          echo "Critical CVSS findings (>=9.0): $critical"
          echo "Secret leaks (gitleaks): $secrets"
          echo "critical_count=$total" >> "$GITHUB_OUTPUT"
          if [ "$total" -gt 0 ]; then
            echo "::error::Found $critical critical-severity finding(s) and $secrets secret leak(s) — blocking merge"
            exit 1
          fi

      - name: Upload scan artifacts
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: security-scan-results
          path: |
            sarif/
            pr-comment.md
          retention-days: 30
          if-no-files-found: ignore
