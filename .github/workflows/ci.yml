name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

# Least-privilege GITHUB_TOKEN (OpenSSF Scorecard Token-Permissions): this
# workflow only reads — checkout + type-check + lint + tests, no writes — so the
# top-level token is read-only and no job widens it.
permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  client-checks:
    name: Client (type + lint + test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: client
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: client/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Lint
        run: npm run lint

      - name: Run tests
        run: npm test -- --run

  diff-coverage:
    name: Diff coverage (gate)
    # Diff-coverage gate for the WebUI client/server monorepo — the % of the
    # CHANGED lines (vs origin/main) that tests execute. HARD GATE: an
    # under-tested PR (diff-coverage < 80%) FAILS this job. Flipped from
    # warn-only 2026-07-08 after the proving window (#205 warn -> prove ->
    # hard-flip rollout): every source-changing PR since the gate landed cleared
    # the bar (#207 89%, #206/#211 100%; nothing would have blocked). 80 matches
    # the monorepo threshold. NOTE: a failing job only BLOCKS merge once this
    # check is listed in the `main-protection` ruleset's required_status_checks —
    # removing continue-on-error is necessary but not sufficient on its own.
    # Self-contained: it re-runs both suites WITH coverage and feeds both
    # cobertura reports to diff-cover, which resolves each package's paths
    # natively via its <source> root (no combine/reroot needed). Only on PRs
    # (needs a compare base).
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Diff base: compare the PR against origin/main — needs full history.
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Client tests with coverage
        working-directory: client
        run: |
          npm ci
          npm test -- --run --coverage --coverage.provider=v8 \
            --coverage.reporter=cobertura --coverage.reportsDirectory=./coverage

      - name: Server tests with coverage
        working-directory: server
        run: |
          npm ci
          npm test -- --run --coverage --coverage.provider=v8 \
            --coverage.reporter=cobertura --coverage.reportsDirectory=./coverage

      # Single source of truth: the gate mechanics (pinned diff-cover, the base
      # fetch, --fail-under, injection-safe input plumbing, SHA-pinned setup-uv)
      # live in the shipwright monorepo's composite action. Pinned to a full
      # commit SHA (supply-chain hardening): a bumped SHA is how an upstream gate
      # fix reaches us, and the pin clears the `github-actions-mutable-action-tag`
      # Semgrep finding. NOTE: a version tag (…@v1) would NOT clear that rule — a
      # tag is still mutable; only a full 40-char SHA does. Re-pin (or add
      # Dependabot) to pick up upstream action changes. diff-cover resolves
      # client/ + server/ paths natively via each cobertura's <source> root (no
      # combine). The action installs uv itself.
      - name: Diff coverage (gate)
        uses: svenroth-ai/shipwright/.github/actions/diff-coverage-gate@f36a656208b512e3260c6e95dbad84bb1650f223  # main
        with:
          coverage-files: client/coverage/cobertura-coverage.xml server/coverage/cobertura-coverage.xml

  # ── A00 (iterate-2026-07-10-harness-hardening) ──────────────────────────────
  # Before this job, CI gated tsc + oxlint + vitest + diff-cover and NOTHING else:
  # 114 Playwright specs existed and zero of them could block a merge. An agent
  # could open a fully-green PR having visually destroyed a screen — vitest cannot
  # see that the board lost its columns or that a glass panel went white-on-white.
  #
  # Both jobs run INSIDE the pinned Playwright image, which is also the only
  # environment the visual baselines are ever generated in. Font rasterisation
  # differs between a Windows dev box and a Linux runner, so a locally-generated
  # PNG would fail here 100% of the time; the image tag must stay in lockstep with
  # `@playwright/test` in client/package.json.
  #
  # NOTE (the arming step): a failing job only BLOCKS a merge once its check name
  # is listed in the `main-protection` ruleset's required_status_checks. Removing
  # continue-on-error is necessary but NOT sufficient. The names are the contract:
  #   "E2E smoke (gate)"  and  "Visual regression (gate)"
  e2e-smoke:
    name: E2E smoke (gate)
    runs-on: ubuntu-latest
    container:
      image: mcr.microsoft.com/playwright:v1.59.1-noble
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          cd client && npm ci
          cd ../server && npm ci

      # The 114 specs were type-checked by NOTHING before A00: client/tsconfig.json
      # pins rootDir to ./src, and Playwright transpiles specs with esbuild, which
      # strips types without checking them.
      - name: Type check the E2E suite
        run: cd client && npm run typecheck:e2e

      - name: Build client
        run: cd client && npm run build

      - name: Boot the isolated stack + run the smoke gate
        run: bash .github/scripts/e2e-stack.sh smoke
        env:
          PORT: '4847'

      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: e2e-smoke-report
          path: |
            client/playwright-report/
            client/test-results/
          retention-days: 7

  visual:
    name: Visual regression (gate)
    runs-on: ubuntu-latest
    container:
      image: mcr.microsoft.com/playwright:v1.59.1-noble
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          cd client && npm ci
          cd ../server && npm ci

      - name: Build client
        run: cd client && npm run build

      - name: Boot the isolated stack + run the visual gate
        run: bash .github/scripts/e2e-stack.sh visual
        env:
          PORT: '4848'

      # BASELINE BOOTSTRAP. On a missing snapshot Playwright WRITES the actual PNG
      # and fails the test. Uploading the snapshot dir on failure is therefore how
      # baselines get created in the first place — and, crucially, they are created
      # by byte-exactly the environment that will later police them. Download this
      # artifact, commit the PNGs, push: the job then goes green.
      #   gh run download <run-id> -n visual-baselines -D client/e2e/visual/__screenshots__
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: visual-baselines
          path: client/e2e/visual/__screenshots__/
          retention-days: 7

      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: visual-diff-report
          path: |
            client/playwright-report/
            client/test-results/
          retention-days: 7

  server-checks:
    name: Server (type + lint + test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: server/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check
        # GATING: the server workspace compiles clean today (0 errors). The
        # former `|| true` + `continue-on-error` fully ignored tsc, so any
        # number of new type errors passed CI green — the "no regression"
        # policy the old comment claimed was never actually enforced. ADR-080
        # cross-package isolation stays pinned by no-cross-package-imports.test.ts;
        # this brings the server Type check to parity with the (already gating)
        # client Type check.
        run: npx tsc --noEmit

      - name: Lint
        run: npm run lint

      - name: Run tests
        run: npm test -- --run
