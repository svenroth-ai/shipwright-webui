name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

# Least-privilege GITHUB_TOKEN (OpenSSF Scorecard Token-Permissions): this
# workflow only reads — checkout + type-check + lint + tests, no writes — so the
# top-level token is read-only and no job widens it.
permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  client-checks:
    name: Client (type + lint + test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: client
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: client/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Lint
        run: npm run lint

      - name: Run tests
        run: npm test -- --run

  diff-coverage:
    name: Diff coverage (warn-only gate)
    # Diff-coverage gate for the WebUI client/server monorepo — the % of the
    # CHANGED lines (vs origin/main) that tests execute. WARN-ONLY for now:
    # continue-on-error keeps it non-blocking during the settling window, so an
    # under-tested PR shows a visible FAILURE annotation but does NOT block merge
    # yet (mirrors the shipwright monorepo's proven warn -> prove -> hard-flip
    # rollout; flip later once the real-PR numbers look sane). 80 matches the
    # monorepo threshold. Self-contained: it re-runs both suites WITH coverage
    # and feeds both cobertura reports to diff-cover, which resolves each package's
    # paths natively via its <source> root (no combine/reroot needed). Only on PRs
    # (needs a compare base).
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
        with:
          # Diff base: compare the PR against origin/main — needs full history.
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Client tests with coverage
        working-directory: client
        run: |
          npm ci
          npm test -- --run --coverage --coverage.provider=v8 \
            --coverage.reporter=cobertura --coverage.reportsDirectory=./coverage

      - name: Server tests with coverage
        working-directory: server
        run: |
          npm ci
          npm test -- --run --coverage --coverage.provider=v8 \
            --coverage.reporter=cobertura --coverage.reportsDirectory=./coverage

      # Single source of truth: the gate mechanics (pinned diff-cover, the base
      # fetch, --fail-under, injection-safe input plumbing, SHA-pinned setup-uv)
      # live in the shipwright monorepo's composite action, so a gate fix flows
      # here on the next run — no ci.yml edit. `@main` is intentional first-party
      # auto-propagation (both repos are svenroth-ai; the mutable-tag Semgrep
      # finding is an accepted risk). WARN-vs-HARD stays this job's
      # `continue-on-error` above — when we hard-flip, pin the action to a
      # released tag (…@v1) instead of `@main`. diff-cover resolves client/ +
      # server/ paths natively via each cobertura's <source> root (no combine).
      # The action installs uv itself.
      - name: Diff coverage (gate)
        uses: svenroth-ai/shipwright/.github/actions/diff-coverage-gate@main
        with:
          coverage-files: client/coverage/cobertura-coverage.xml server/coverage/cobertura-coverage.xml

  server-checks:
    name: Server (type + lint + test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: server/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check
        # GATING: the server workspace compiles clean today (0 errors). The
        # former `|| true` + `continue-on-error` fully ignored tsc, so any
        # number of new type errors passed CI green — the "no regression"
        # policy the old comment claimed was never actually enforced. ADR-080
        # cross-package isolation stays pinned by no-cross-package-imports.test.ts;
        # this brings the server Type check to parity with the (already gating)
        # client Type check.
        run: npx tsc --noEmit

      - name: Lint
        run: npm run lint

      - name: Run tests
        run: npm test -- --run
