# OpenSSF Scorecard — the native, recognized 0–10 supply-chain health score.
#
# The Control-Grade dashboard is *modeled on* Scorecard's methodology; this
# workflow runs the real `ossf/scorecard-action` so the recognized anchor also
# runs against this repo (its SARIF lands in the Security tab and, on this public
# repo, the result is published to the OpenSSF Scorecard API for the badge).
# It runs on the default branch only — never as a PR gate — so it cannot block a
# merge; surfacing the native score next to the custom grade is a follow-up.
name: Scorecard supply-chain security

on:
  branch_protection_rule:
  schedule:
    - cron: '0 6 * * 1'  # Monday 06:00 UTC — matches security.yml / codeql.yml
  push:
    branches: [main]
  workflow_dispatch:

# Declare the default token as read-all; the job widens only what it needs.
permissions: read-all

concurrency:
  group: scorecard-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analysis:
    name: Scorecard analysis
    # Canonical repo only — a fork's scheduled run would fail the publish step.
    if: github.repository == 'svenroth-ai/shipwright-webui'
    runs-on: ubuntu-latest
    permissions:
      security-events: write  # upload the SARIF result to the Security tab
      id-token: write         # publish results to the public OpenSSF API
      contents: read
      actions: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Run Scorecard analysis
        # Tag (NOT a SHA): with publish_results the OpenSSF API verifies the
        # workflow and rejects a SHA pin as an "imposter commit" — it only
        # recognises official release tags. ossf/scorecard-action is the one
        # third-party action this repo pins by tag, for that reason.
        uses: ossf/scorecard-action@v2.4.3
        with:
          results_file: results.sarif
          results_format: sarif
          # Public repo → publish to the OpenSSF Scorecard API (badge + trend).
          # The Branch-Protection / Maintained checks read more detail with a
          # repo-scoped PAT, but the default token suffices for the SARIF + badge.
          publish_results: true

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: scorecard-sarif
          path: results.sarif
          retention-days: 5

      - name: Upload SARIF to GitHub Security
        # Defensive: never gate this workflow on SARIF upload (a private fork or a
        # repo without GitHub Advanced Security returns an error here) — mirrors
        # security.yml's upload step.
        uses: github/codeql-action/upload-sarif@v4
        continue-on-error: true
        with:
          sarif_file: results.sarif
          category: ossf-scorecard
