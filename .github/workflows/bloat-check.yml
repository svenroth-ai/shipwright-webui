name: Bloat Check

# Mirrors shipwright lead-repo bloat-check workflow (Campaign A.defense).
# Runs the vendored anti-ratchet gate on every PR.  Posts an idempotent
# PR comment with the allowlist diff vs the base ref.  Exit 1 ONLY on
# anti-ratchet — new crossings stay advisory.

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

# Least-privilege GITHUB_TOKEN (OpenSSF Scorecard Token-Permissions): the
# top-level token is read-only; the bloat-check job widens itself to
# pull-requests:write for its comment step.
permissions:
  contents: read

concurrency:
  group: bloat-check-${{ github.ref }}
  cancel-in-progress: true

jobs:
  bloat-check:
    name: Anti-ratchet + allowlist diff
    runs-on: ubuntu-latest
    # pull-requests:write — required by the "Post / update PR comment" step.
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Checkout PR head with full history
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: '3.11'

      - name: Resolve base ref
        id: base
        run: |
          base_sha="${{ github.event.pull_request.base.sha }}"
          echo "base_sha=$base_sha" >> "$GITHUB_OUTPUT"

      - name: Capture base baseline
        run: |
          git show "${{ steps.base.outputs.base_sha }}:shipwright_bloat_baseline.json" \
              > /tmp/baseline_base.json 2>/dev/null || echo '{"version":1,"entries":[]}' > /tmp/baseline_base.json

      - name: Run anti-ratchet check (worktree mode)
        id: ratchet
        run: |
          set +e
          python scripts/hooks/anti_ratchet_check.py \
              --project-root . \
              --worktree --json > /tmp/ratchet.json 2> /tmp/ratchet.stderr
          echo "exit_code=$?" >> "$GITHUB_OUTPUT"
          cat /tmp/ratchet.json
          echo "----- stderr -----"
          cat /tmp/ratchet.stderr || true

      - name: Build allowlist diff
        run: |
          python scripts/hooks/build_bloat_diff.py \
              --base /tmp/baseline_base.json \
              --head shipwright_bloat_baseline.json \
              --ratchet /tmp/ratchet.json \
              > /tmp/diff.md

      - name: Post / update PR comment
        if: ${{ github.event_name == 'pull_request' }}
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7.1.0
        continue-on-error: true
        env:
          DIFF_PATH: /tmp/diff.md
        with:
          script: |
            const fs = require('fs');
            const marker = '<!-- shipwright-bloat-check -->';
            const body = marker + '\n' + fs.readFileSync(process.env.DIFF_PATH, 'utf8');
            const { owner, repo } = context.repo;
            const issue_number = context.payload.pull_request.number;
            const existing = await github.paginate(
              github.rest.issues.listComments,
              { owner, repo, issue_number }
            );
            const prior = existing.find(c => c.body && c.body.includes(marker));
            if (prior) {
              await github.rest.issues.updateComment({
                owner, repo, comment_id: prior.id, body,
              });
            } else {
              await github.rest.issues.createComment({
                owner, repo, issue_number, body,
              });
            }

      - name: Fail on anti-ratchet
        if: ${{ steps.ratchet.outputs.exit_code != '0' }}
        run: |
          echo "::error::anti-ratchet block — see PR comment + workflow log"
          cat /tmp/ratchet.stderr
          exit 1
