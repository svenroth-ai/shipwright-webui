# Generated by Shipwright — Independent Claude Code review
# Claude Architect Best Practice: "Write in one session, review in a different one."
name: Claude Code Review

on:
  pull_request:
    branches: [main, develop]

permissions:
  contents: read
  pull-requests: write

jobs:
  claude-review:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Claude Code
        run: npm install -g @anthropic-ai/claude-code

      - name: Get PR diff
        id: diff
        run: |
          git diff origin/${{ github.base_ref }}...HEAD > /tmp/pr-diff.txt
          echo "diff_size=$(wc -l < /tmp/pr-diff.txt)" >> "$GITHUB_OUTPUT"

      - name: Skip if diff too large
        if: steps.diff.outputs.diff_size > 5000
        run: echo "Diff exceeds 5000 lines — skipping automated review to save tokens."

      - name: Claude Code Review (per-file pass)
        if: steps.diff.outputs.diff_size <= 5000
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          claude -p "Review this PR diff for bugs, security issues, performance problems, and spec compliance. Focus on high-severity findings only. Return JSON with findings array." \
            --output-format json \
            --max-tokens 4096 \
            < /tmp/pr-diff.txt \
            > /tmp/review-output.json || true

      - name: Format and post review comment
        if: steps.diff.outputs.diff_size <= 5000
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');

            let review;
            try {
              review = JSON.parse(fs.readFileSync('/tmp/review-output.json', 'utf8'));
            } catch (e) {
              console.log('No valid review output — skipping comment.');
              return;
            }

            // Format findings as markdown
            const result = review.result || review;
            let body = '## Claude Code Review\n\n';

            if (result.findings && result.findings.length > 0) {
              body += `Found **${result.findings.length}** finding(s):\n\n`;
              for (const f of result.findings) {
                const icon = f.severity === 'high' ? '🔴' : f.severity === 'medium' ? '🟡' : '🔵';
                body += `${icon} **${f.category || 'general'}** (${f.severity || 'info'})\n`;
                if (f.file) body += `  File: \`${f.file}\`${f.line ? `:${f.line}` : ''}\n`;
                body += `  ${f.finding}\n`;
                if (f.suggestion) body += `  💡 ${f.suggestion}\n`;
                body += '\n';
              }
            } else {
              body += '✅ No significant findings. Code looks good.\n';
            }

            body += '\n---\n_Independent review by Claude Code (separate session from implementation)_';

            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            });
